          ctx.save();
          ctx.globalCompositeOperation = "screen";
          drawCloudMass(x + driftA, baseY - scale * 0.04, scale * 0.9, 0.34, 36, "rgba(118,137,158,0.48)");
          drawCloudMass(x - scale * 0.16 + driftB, baseY + scale * 0.05, scale * 1.04, 0.3, 30, "rgba(159,178,193,0.38)");
          drawCloudMass(x + scale * 0.2 - driftA * 0.5, baseY + scale * 0.1, scale * 0.78, 0.26, 22, "rgba(91,111,134,0.46)");
          drawCloudMass(x + driftC, baseY - scale * 0.12, scale * 0.54, 0.18, 18, "rgba(198,213,222,0.32)");
          ctx.restore();
        }

        function heroClipBounds() {
          const hero = document.querySelector(".hero");
          if (!hero) return null;
          const rect = hero.getBoundingClientRect();
          const top = clamp(rect.top, 0, height);
          const bottom = clamp(rect.bottom, 0, height);
          if (bottom <= top) return null;
          return { top, bottom };
        }

        function drawHeroIllustration(time) {
          const bounds = heroClipBounds();
          if (!bounds) return;
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, bounds.top, width, bounds.bottom - bounds.top);
          ctx.clip();
          if (theme === "night") drawHeroMoon(time);
          if (theme === "sunny") drawHeroSun(time);
          if (theme === "cloudy") drawHeroCloud(time, false);
          if (theme === "rain") drawHeroCloud(time, true);
          ctx.restore();
        }

        function background(time) {
          const top = getComputedStyle(document.documentElement).getPropertyValue("--bg-top").trim();
          const bottom = getComputedStyle(document.documentElement).getPropertyValue("--bg-bottom").trim();
          const gradient = ctx.createLinearGradient(0, 0, 0, height);
          gradient.addColorStop(0, top);
          gradient.addColorStop(1, bottom);
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);

          if (theme === "sunny") {
            const center = heroIllustrationCenter();
            const pulse = 0.5 + Math.sin(time * 0.0007) * 0.08;
            const radial = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, width * pulse);
            radial.addColorStop(0, "rgba(255,213,79,0.28)");
            radial.addColorStop(0.34, "rgba(255,143,0,0.13)");
            radial.addColorStop(1, "rgba(255,143,0,0)");
            ctx.fillStyle = radial;
            ctx.fillRect(0, 0, width, height);

            const lowGlow = ctx.createRadialGradient(width * 0.62, height * 0.98, 0, width * 0.62, height * 0.98, width * 0.72);
            lowGlow.addColorStop(0, "rgba(255,183,57,0.13)");
            lowGlow.addColorStop(0.55, "rgba(255,143,0,0.05)");
            lowGlow.addColorStop(1, "rgba(255,143,0,0)");
            ctx.fillStyle = lowGlow;
            ctx.fillRect(0, 0, width, height);
          }

          if (theme === "night") {
            const aurora = ctx.createLinearGradient(0, 0, width, height * 0.35);
            aurora.addColorStop(0, `rgba(124,77,255,${0.05 + Math.sin(time * 0.0005) * 0.025})`);
            aurora.addColorStop(0.5, `rgba(79,195,247,${0.04 + Math.cos(time * 0.0004) * 0.02})`);
            aurora.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = aurora;
            ctx.fillRect(0, 0, width, height * 0.45);
          }
        }

        function drawRain(delta, time) {
          drops.forEach((drop) => {
            drop.y += (drop.speed * delta) / 1000;
            drop.x += (drop.drift * delta) / 1000;
            if (drop.y > height + drop.len) {
              if (Math.random() > 0.86) ripples.push({ x: drop.x, y: height - random(10, 36), r: 0, alpha: 0.28 });
              drop.y = -drop.len;
              drop.x = random(0, width * 1.15);
            }
            ctx.beginPath();
            ctx.strokeStyle = `rgba(188,231,255,${drop.alpha})`;
            ctx.lineWidth = drop.len > 32 ? 1.6 : 0.8;
            ctx.moveTo(drop.x, drop.y);
            ctx.lineTo(drop.x + drop.drift * 0.04, drop.y + drop.len);
            ctx.stroke();
          });

          for (let i = ripples.length - 1; i >= 0; i--) {
            const ripple = ripples[i];
            ripple.r += (56 * delta) / 1000;
            ripple.alpha -= (0.38 * delta) / 1000;
            ctx.beginPath();
            ctx.ellipse(ripple.x, ripple.y, ripple.r * 1.8, ripple.r * 0.42, 0, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(188,231,255,${Math.max(0, ripple.alpha)})`;
            ctx.lineWidth = 1;
            ctx.stroke();
            if (ripple.alpha <= 0) ripples.splice(i, 1);
          }
        }

        function drawClouds(delta) {
          clouds.forEach((cloud) => {
            cloud.x += (cloud.speed * delta) / 1000;
            if (cloud.x > width + 260) cloud.x = -320;
            ctx.save();
            ctx.globalAlpha = cloud.alpha;
            ctx.filter = "blur(32px)";
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.beginPath();
            ctx.ellipse(cloud.x, cloud.y, 120 * cloud.scale, 42 * cloud.scale, 0, 0, Math.PI * 2);
            ctx.ellipse(cloud.x + 78 * cloud.scale, cloud.y + 16 * cloud.scale, 110 * cloud.scale, 38 * cloud.scale, 0, 0, Math.PI * 2);
            ctx.ellipse(cloud.x - 66 * cloud.scale, cloud.y + 20 * cloud.scale, 88 * cloud.scale, 34 * cloud.scale, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });
        }

        function drawNight(delta, time) {
          stars.forEach((star) => {
            const alpha = 0.28 + Math.sin(time * 0.001 * star.speed + star.twinkle) * 0.22;
            ctx.beginPath();
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
            ctx.fill();
          });

          if (!shootingStar && Math.random() > 0.992) {
            shootingStar = { x: random(width * 0.35, width), y: random(20, height * 0.36), life: 0 };
          }

          if (shootingStar) {
            shootingStar.life += delta;
            const distance = shootingStar.life * 0.62;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, 1 - shootingStar.life / 900)})`;
            ctx.lineWidth = 2;
            ctx.moveTo(shootingStar.x - distance, shootingStar.y + distance * 0.35);
            ctx.lineTo(shootingStar.x, shootingStar.y);
            ctx.stroke();
            if (shootingStar.life > 900) shootingStar = null;
          }
        }

        function tick(time) {
          const delta = Math.min(32, time - last || 16);
          last = time;
          background(time);
          if (theme === "night") drawNight(delta, time);
          drawHeroIllustration(time);
          if (theme === "rain") drawRain(delta, time);
          if (theme === "cloudy") drawClouds(delta);
          if (theme === "night") {
            drawClouds(delta * 0.32);
          }
          requestAnimationFrame(tick);
        }

        window.addEventListener("resize", resize);
        resize();
        requestAnimationFrame(tick);

        return { setTheme };
      })();

      renderAll(0);
      loadCity(state.city);
    </script>
  </body>
